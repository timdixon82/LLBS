<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLBS Photo Brander</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      color: #1a2942;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    header img {
      height: 56px;
      object-fit: contain;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a2942;
      letter-spacing: 0.02em;
    }

    header p {
      font-size: 0.88rem;
      color: #5a6a82;
    }

    /* ── Upload area ── */
    .upload-area {
      width: 100%;
      max-width: 560px;
      border: 2.5px dashed #a3b8d8;
      border-radius: 16px;
      background: #fff;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .upload-area:hover, .upload-area.drag-over {
      border-color: #1a56db;
      background: #eef3ff;
    }

    .upload-area svg { color: #1a56db; }

    .upload-area span {
      font-size: 0.95rem;
      color: #5a6a82;
    }

    .upload-area strong { color: #1a2942; }

    #fileInput { display: none; }

    /* ── Preview / Canvas ── */
    .canvas-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 720px;
    }

    canvas {
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(26,41,66,0.18);
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-size: 0.97rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    .btn-primary {
      background: #1a56db;
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.88; }

    .btn-secondary {
      background: #fff;
      color: #1a56db;
      border: 2px solid #1a56db;
    }

    .btn-secondary:hover { background: #eef3ff; }

    .btn-danger {
      background: #fff;
      color: #c0392b;
      border: 2px solid #c0392b;
    }

    .btn-danger:hover { background: #fdf0ef; }

    /* ── Status message ── */
    #status {
      font-size: 0.88rem;
      color: #5a6a82;
      min-height: 20px;
    }

    /* ── Share not supported notice ── */
    #downloadFallback {
      display: none;
      font-size: 0.85rem;
      color: #c0392b;
      text-align: center;
    }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 22px; height: 22px;
      border: 3px solid #c7d7f0;
      border-top-color: #1a56db;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <img id="headerLogo" src="https://bd.llbs.co.uk/wp-content/uploads/2024/02/LLBS-logo-with-text-300x83-1.webp" alt="LLBS Logo" crossorigin="anonymous" />
  <h1>LLBS Photo Brander</h1>
  <p>Upload a photo &amp; add the LLBS branding in seconds</p>
</header>

<!-- Upload -->
<div class="upload-area" id="dropZone">
  <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
    <path stroke-linecap="round" stroke-linejoin="round"
      d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
  </svg>
  <span><strong>Click to upload</strong> or drag &amp; drop</span>
  <span>JPG, PNG, WEBP, GIF — any size</span>
  <input type="file" id="fileInput" accept="image/*" />
</div>

<!-- Canvas preview -->
<div class="canvas-wrap" id="canvasWrap">
  <canvas id="canvas"></canvas>
  <div id="status"></div>
  <div class="btn-row">
    <button class="btn-primary" id="shareBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z" />
      </svg>
      Share Image
      <div class="spinner" id="shareSpinner"></div>
    </button>
    <button class="btn-secondary" id="downloadBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
      </svg>
      Download
    </button>
    <button class="btn-danger" id="resetBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
      </svg>
      Start Over
    </button>
  </div>
  <p id="downloadFallback">Sharing not supported on this browser — please use the Download button instead.</p>
</div>

<script>
  // ─────────────────────────────────────────────
  // Config
  // ─────────────────────────────────────────────
  const LOGO_URL      = 'https://bd.llbs.co.uk/wp-content/uploads/2024/02/LLBS-logo-with-text-300x83-1.webp';
  const CORS_PROXIES  = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => url  // last resort — direct (may fail cross-origin)
  ];

  const BRAND_HEIGHT_RATIO = 0.14;   // branding strip = 14% of image height
  const BRAND_MIN_PX       = 90;     // at least 90 px tall
  const BRAND_MAX_PX       = 180;    // at most 180 px tall
  const LINE_HEIGHT_PX     = 5;      // blue line thickness
  const LINE_COLOR         = '#1a56db';
  const LOGO_PADDING_RATIO = 0.12;   // logo side padding as fraction of strip width
  const LOGO_VERT_PAD      = 0.1;    // logo vertical padding as fraction of strip height

  // ─────────────────────────────────────────────
  // DOM refs
  // ─────────────────────────────────────────────
  const dropZone      = document.getElementById('dropZone');
  const fileInput     = document.getElementById('fileInput');
  const canvasWrap    = document.getElementById('canvasWrap');
  const canvas        = document.getElementById('canvas');
  const ctx           = canvas.getContext('2d');
  const statusEl      = document.getElementById('status');
  const shareBtn      = document.getElementById('shareBtn');
  const downloadBtn   = document.getElementById('downloadBtn');
  const resetBtn      = document.getElementById('resetBtn');
  const shareSpinner  = document.getElementById('shareSpinner');
  const dlFallback    = document.getElementById('downloadFallback');

  // ─────────────────────────────────────────────
  // State
  // ─────────────────────────────────────────────
  let userImage  = null;   // HTMLImageElement
  let llbsLogo   = null;   // HTMLImageElement
  let originalFileName = 'photo.jpg';

  // ─────────────────────────────────────────────
  // Logo loading (with CORS proxy fallback)
  // ─────────────────────────────────────────────
  async function loadLogoWithFallback() {
    for (const proxyFn of CORS_PROXIES) {
      const url = proxyFn(LOGO_URL);
      try {
        const img = await loadImage(url, true);
        return img;
      } catch (_) { /* try next proxy */ }
    }
    throw new Error('Could not load LLBS logo from any source.');
  }

  function loadImage(src, crossOrigin = false) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      if (crossOrigin) img.crossOrigin = 'anonymous';
      img.onload  = () => resolve(img);
      img.onerror = () => reject(new Error(`Failed: ${src}`));
      img.src = src;
    });
  }

  // ─────────────────────────────────────────────
  // Composite & draw
  // ─────────────────────────────────────────────
  function drawComposite() {
    if (!userImage || !llbsLogo) return;

    const imgW = userImage.naturalWidth;
    const imgH = userImage.naturalHeight;

    const stripH = Math.min(BRAND_MAX_PX,
                   Math.max(BRAND_MIN_PX, Math.round(imgH * BRAND_HEIGHT_RATIO)));

    canvas.width  = imgW;
    canvas.height = imgH + stripH;

    // 1. Draw user photo
    ctx.drawImage(userImage, 0, 0, imgW, imgH);

    // 2. White branding strip
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, imgH, imgW, stripH);

    // 3. Blue line at top of strip
    ctx.fillStyle = LINE_COLOR;
    ctx.fillRect(0, imgH, imgW, LINE_HEIGHT_PX);

    // 4. Draw logo centred in the white strip (below the blue line)
    const stripBody   = stripH - LINE_HEIGHT_PX;
    const availH      = stripBody * (1 - LOGO_VERT_PAD * 2);
    const availW      = imgW    * (1 - LOGO_PADDING_RATIO * 2);

    const logoAspect  = llbsLogo.naturalWidth / llbsLogo.naturalHeight;
    let logoW = availW;
    let logoH = logoW / logoAspect;
    if (logoH > availH) { logoH = availH; logoW = logoH * logoAspect; }

    const logoX = (imgW - logoW) / 2;
    const logoY = imgH + LINE_HEIGHT_PX + (stripBody - logoH) / 2;

    ctx.drawImage(llbsLogo, logoX, logoY, logoW, logoH);
  }

  // ─────────────────────────────────────────────
  // File handling
  // ─────────────────────────────────────────────
  async function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) {
      setStatus('❌ Please choose a valid image file.'); return;
    }

    originalFileName = file.name.replace(/\.[^.]+$/, '') + '_llbs_branded.jpg';
    setStatus('⏳ Loading image…');

    const objectURL = URL.createObjectURL(file);
    try {
      userImage = await loadImage(objectURL);
    } catch (e) {
      setStatus('❌ Could not read image.'); return;
    }

    // Show canvas wrap
    dropZone.style.display  = 'none';
    canvasWrap.style.display = 'flex';
    setStatus('⏳ Loading LLBS logo…');

    if (!llbsLogo) {
      try {
        llbsLogo = await loadLogoWithFallback();
      } catch (e) {
        setStatus('⚠️ Logo unavailable — branding strip shown without logo.');
      }
    }

    drawComposite();
    setStatus('✅ Branded image ready!');
  }

  // ─────────────────────────────────────────────
  // Share
  // ─────────────────────────────────────────────
  shareBtn.addEventListener('click', async () => {
    if (!navigator.canShare) {
      dlFallback.style.display = 'block';
      return;
    }

    shareSpinner.style.display = 'inline-block';
    setStatus('⏳ Preparing to share…');

    canvas.toBlob(async (blob) => {
      if (!blob) { setStatus('❌ Could not create image blob.'); shareSpinner.style.display = 'none'; return; }

      const file = new File([blob], originalFileName, { type: 'image/jpeg' });

      if (!navigator.canShare({ files: [file] })) {
        dlFallback.style.display = 'block';
        setStatus('');
        shareSpinner.style.display = 'none';
        return;
      }

      try {
        await navigator.share({
          files: [file],
          title: 'LLBS Branded Photo',
          text:  'Shared via LLBS Photo Brander — llbs.co.uk'
        });
        setStatus('✅ Shared successfully!');
      } catch (err) {
        if (err.name !== 'AbortError') {
          setStatus('❌ Share failed: ' + err.message);
        } else {
          setStatus('✅ Branded image ready!');
        }
      }
      shareSpinner.style.display = 'none';
    }, 'image/jpeg', 0.92);
  });

  // ─────────────────────────────────────────────
  // Download
  // ─────────────────────────────────────────────
  downloadBtn.addEventListener('click', () => {
    canvas.toBlob((blob) => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = originalFileName;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
      setStatus('✅ Download started!');
    }, 'image/jpeg', 0.92);
  });

  // ─────────────────────────────────────────────
  // Reset
  // ─────────────────────────────────────────────
  resetBtn.addEventListener('click', () => {
    userImage = null;
    fileInput.value = '';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvasWrap.style.display = 'none';
    dropZone.style.display   = '';
    dlFallback.style.display = 'none';
    setStatus('');
  });

  // ─────────────────────────────────────────────
  // Drag & Drop
  // ─────────────────────────────────────────────
  dropZone.addEventListener('click',    () => fileInput.click());
  fileInput.addEventListener('change',  e  => handleFile(e.target.files[0]));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave',   () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });

  // ─────────────────────────────────────────────
  // Utility
  // ─────────────────────────────────────────────
  function setStatus(msg) { statusEl.textContent = msg; }

  // Pre-warm the logo fetch in the background
  loadLogoWithFallback().then(img => { llbsLogo = img; }).catch(() => {});
</script>
</body>
</html>
