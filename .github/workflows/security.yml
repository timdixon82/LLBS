# Security checks: Semgrep, Trivy, and dependency review.
#
# Runs on every pull request and weekly on Monday morning. dependency-
# review runs only on pull requests. LLBS is a public repository, so
# dependency-review is free; it does not require GitHub Advanced
# Security.
#
# Security note: no untrusted GitHub context variables are used in any
# run step.
#
# Action versions are pinned to commit SHAs verified on 2026-05-23.

name: Security
on:
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # weekly, Monday morning

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Semgrep
        run: |
          pip install semgrep
          semgrep ci

  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: '1'

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
