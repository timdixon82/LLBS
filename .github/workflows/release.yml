# Release automation with release-please.
#
# Runs on every push to main. release-please reads the conventional-
# commit history since the last release tag and opens (or updates) a
# release pull request that bumps the version, generates the CHANGELOG
# section, and tags the release on merge. The configuration is in
# release-please-config.json; the per-package manifest is in
# .release-please-manifest.json.
#
# The only GitHub expression here is secrets.GITHUB_TOKEN, which is the
# safe, built-in repo token, not an untrusted user-supplied value.
#
# Action versions are pinned to commit SHAs verified on 2026-05-23.

name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
