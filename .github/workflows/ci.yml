# Continuous integration for the LLBS static front-end.
#
# Runs on every pull request and on pushes to main. Lints HTML
# (html-validate), CSS (stylelint), and JavaScript (eslint). All three
# linters are pinned in package.json; CI installs them with npm ci from
# the committed package-lock.json. The linter configuration files
# (.htmlvalidate.json, .stylelintrc.json, eslint.config.js) live in the
# repository root.
#
# Action versions are pinned to commit SHAs verified on 2026-05-23.
# The version tag is shown in the trailing comment. To update an action,
# change the SHA and the comment together.
#
# Security note: no untrusted GitHub context variables are interpolated
# into any run step. Every run command is a fixed string.

name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint HTML, CSS, and JavaScript
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML
        run: npm run lint:html

      - name: Lint CSS
        run: npm run lint:css

      - name: Lint JavaScript
        run: npm run lint:js
