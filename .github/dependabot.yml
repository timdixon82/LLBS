# Dependabot configuration.
# Weekly grouped updates for GitHub Actions and npm.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      javascript:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /.github/accessibility-tools
    schedule:
      interval: weekly
    groups:
      accessibility-tools:
        patterns: ["*"]
